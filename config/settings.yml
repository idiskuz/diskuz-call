# Admin > Site settings > Plugins
plugins:
  diskuz_call_enabled:
    default: true
    client: true
  # Chi può vedere e usare diskuz Call. Default: amministratori (1), moderatori (2), staff (3).
  diskuz_call_allowed_groups:
    default: "1|2|3"
    type: group_list
    list_type: compact
    client: true
  # Se true (e discourse-follow è attivo), il destinatario deve seguire il chiamante per ricevere chiamate.
  diskuz_call_require_follow:
    default: true
    type: boolean
    client: true
  # Suono per chiamate in arrivo: Discourse chat (none/default/ding/bell/chat), custom (URL sotto), oppure alternative (5 suonerie sotto).
  diskuz_call_incoming_sound:
    default: "default"
    type: enum
    client: true
    choices:
      - none
      - default
      - ding
      - bell
      - chat
      - custom
      - alternative
  # URL suoneria personalizzata (MP3). Usato quando "Suono chiamate in arrivo" è "custom". Max consigliato 500 KB.
  diskuz_call_custom_ringtone_url:
    default: ""
    client: true
  # Suoneria alternativa (usata quando "Suono chiamate in arrivo" è "alternative"). Scegli una delle 10 suonerie.
  diskuz_call_alternative_ringtone:
    default: "classic"
    type: enum
    client: true
    choices:
      - classic
      - modern
      - soft
      - double
      - melodic
      - retro
      - digital
      - pulse
      - star
      - cascade
  # ICE servers per WebRTC (opzionale). JSON array, es: [{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:turn.example.com","username":"user","credential":"pass"}]. Lascia vuoto per usare solo STUN Google.
  diskuz_call_ice_servers:
    default: ""
    client: true
