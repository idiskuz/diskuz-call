# Admin > Site settings > Plugins
plugins:
  diskuz_call_enabled:
    default: true
    client: true
  # Colore principale del plugin (pulsante, sfondi, accenti). Default: verde #13c98c.
  diskuz_call_primary_color:
    default: "#13c98c"
    client: true
  # Chi può vedere e usare diskuz Call. Default: amministratori (1), moderatori (2), staff (3).
  diskuz_call_allowed_groups:
    default: "1|2|3"
    type: group_list
    list_type: compact
    client: true
  # Se true (e discourse-follow è attivo), il destinatario deve seguire il chiamante per ricevere chiamate.
  diskuz_call_require_follow:
    default: true
    type: boolean
    client: true
  # Suono per chiamate in arrivo: Discourse chat (none/default/ding/bell/chat), custom (URL sotto), oppure alternative (5 suonerie sotto).
  diskuz_call_incoming_sound:
    default: "default"
    type: enum
    client: true
    choices:
      - none
      - default
      - ding
      - bell
      - chat
      - custom
      - alternative
  # Fino a 10 suonerie personalizzate (MP3). L'admin inserisce gli URL; l'utente ne sceglie una dal widget (con anteprima).
  diskuz_call_custom_ringtone_1:
    default: ""
    client: true
  diskuz_call_custom_ringtone_2:
    default: ""
    client: true
  diskuz_call_custom_ringtone_3:
    default: ""
    client: true
  diskuz_call_custom_ringtone_4:
    default: ""
    client: true
  diskuz_call_custom_ringtone_5:
    default: ""
    client: true
  diskuz_call_custom_ringtone_6:
    default: ""
    client: true
  diskuz_call_custom_ringtone_7:
    default: ""
    client: true
  diskuz_call_custom_ringtone_8:
    default: ""
    client: true
  diskuz_call_custom_ringtone_9:
    default: ""
    client: true
  diskuz_call_custom_ringtone_10:
    default: ""
    client: true
  # Suoneria alternativa (usata quando "Suono chiamate in arrivo" è "alternative"). Suonerie movimentate + Relaz (rilassanti). Default: ringtone 3 (soft).
  diskuz_call_alternative_ringtone:
    default: "soft"
    type: enum
    client: true
    choices:
      - classic
      - modern
      - soft
      - double
      - melodic
      - retro
      - digital
      - pulse
      - star
      - cascade
      - festivo
      - allegro
      - vivace
      - brillante
      - energico
      - dinamico
      - scintilla
      - campanella
      - trillo
      - marimba
      - relax1
      - relax2
      - relax3
      - relax4
      - relax5
  # Gruppi che possono abilitare il video durante una chiamata (stesso formato di "Chi può usare diskuz Call"). Solo chi è in questi gruppi vede il tasto Video in chiamata.
  diskuz_call_video_allowed_groups:
    default: "1|2|3"
    type: group_list
    list_type: compact
    client: true
  # ICE servers per WebRTC (opzionale). JSON array, es: [{"urls":"stun:stun.l.google.com:19302"},{"urls":"turn:turn.example.com","username":"user","credential":"pass"}]. Lascia vuoto per usare solo STUN Google.
  diskuz_call_ice_servers:
    default: ""
    client: true
