# Part 3: etichette per le site settings (Admin > Site settings > Plugins)
en:
  diskuz_call:
    custom_ringtone_n: "Ringtone %{n}"
  site_settings:
    diskuz_call_enabled: "Enable diskuz Call (VoIP calls between users)"
    diskuz_call_allowed_groups: "Who can see and use diskuz Call (default: Administrators only; you can add Staff, Moderators, or trust level groups)"
    diskuz_call_require_follow: "Require the callee to follow the caller (when discourse-follow is enabled). If disabled, any allowed user can call any other allowed user."
    diskuz_call_incoming_sound: "Sound for incoming calls: Discourse (none/default/ding/bell/chat), custom (up to 10 MP3 ringtones below; user picks one in the widget with preview), or alternative (built-in). Ringtone plays for up to 48 seconds."
    diskuz_call_custom_ringtone_1: "Custom ringtone 1 (MP3 URL). Users can choose it in the widget and preview it."
    diskuz_call_custom_ringtone_2: "Custom ringtone 2 (MP3 URL)"
    diskuz_call_custom_ringtone_3: "Custom ringtone 3 (MP3 URL)"
    diskuz_call_custom_ringtone_4: "Custom ringtone 4 (MP3 URL)"
    diskuz_call_custom_ringtone_5: "Custom ringtone 5 (MP3 URL)"
    diskuz_call_custom_ringtone_6: "Custom ringtone 6 (MP3 URL)"
    diskuz_call_custom_ringtone_7: "Custom ringtone 7 (MP3 URL)"
    diskuz_call_custom_ringtone_8: "Custom ringtone 8 (MP3 URL)"
    diskuz_call_custom_ringtone_9: "Custom ringtone 9 (MP3 URL)"
    diskuz_call_custom_ringtone_10: "Custom ringtone 10 (MP3 URL). Up to 48 seconds to play the full ringtone."
    diskuz_call_alternative_ringtone: "Alternative ringtone (all lively). Used when Sound for incoming calls is set to alternative. Original: classic, modern, soft, double, melodic, retro, digital, pulse, star, cascade. New lively: festivo, allegro, vivace, brillante, energico, dinamico, scintilla, campanella, trillo, marimba. Relax (Chiamate Relaz): relax1, relax2, relax3, relax4, relax5."
    diskuz_call_video_allowed_groups: "Groups that can enable video during a call (same format as «Who can use diskuz Call»). Only users in these groups see the Video button once the call is connected."
    diskuz_call_ice_servers: "ICE servers for WebRTC (optional). JSON array, e.g. [{\"urls\":\"stun:stun.l.google.com:19302\"},{\"urls\":\"turn:turn.example.com\",\"username\":\"user\",\"credential\":\"pass\"}]. Leave empty to use default Google STUN only. Add a TURN server if calls fail on mobile or corporate networks."
